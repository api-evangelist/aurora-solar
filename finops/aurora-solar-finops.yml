description: >-
  FinOps view of Aurora Solar spend. Aurora is a SaaS platform for solar sales
  and design, billed primarily as per-user, per-month seat licenses (annual
  commitment) across named tiers, with advanced capabilities (AutoDesigner,
  advanced shading, storage) gated to higher tiers or sold as add-ons. Aurora
  also offers a credit-based consumption model where individual projects/designs
  are charged in credits. The API is not a separately metered product; API cost
  is a function of the underlying subscription (seats) and any per-project credit
  consumption that API-driven design/proposal generation triggers. Prices are not
  published and are set through a sales quote.
notes: >-
  All amounts are quote-specific and unpublished; the dominant cost drivers are
  seat count and, under the credit model, the number and type of designs/projects
  generated. API automation can increase credit consumption (each auto-design /
  AI-modeling run costs credits), so treat automated design generation as a
  metered cost even though the HTTP calls themselves are not billed per request.

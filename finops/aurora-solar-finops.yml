meters:
- name: seat_licenses
  description: Per-user monthly seat licenses, billed annually per tier (Grow/Scale/Run or equivalent).
  unit: seats
  aggregation: sum
  dimensions:
  - tenant
  - tier
  - user
- name: design_credits
  description: Credits consumed per project/design under Aurora's credit-based consumption model.
  unit: credits
  aggregation: sum
  dimensions:
  - tenant
  - project
  - design
- name: ai_modeling_addon
  description: Additional credits for AI/auto modeling add-ons on a design.
  unit: credits
  aggregation: sum
  dimensions:
  - tenant
  - design
principles:
- name: Visibility
  description: Track seat count per tenant/tier and credit consumption per project and design; attribute automated (API-driven) design runs to the credits they consume.
- name: Allocation
  description: Tag projects and API keys (Restricted keys can be scoped by tags) per team/office so seat and credit spend maps to internal cost centers.
- name: Optimization
  description: Right-size seats to active designers, prefer webhooks over polling to avoid wasted API calls, and reuse designs/proposals rather than regenerating to avoid extra credit consumption.
- name: Accountability
  description: Assign owners per tenant and per office; review seat utilization and monthly credit burn against the negotiated Aurora agreement.

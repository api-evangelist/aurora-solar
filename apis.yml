aid: aurora-solar
url: https://raw.githubusercontent.com/api-evangelist/aurora-solar/refs/heads/main/apis.yml
name: Aurora Solar
kind: company
description: Aurora Solar is a cloud platform for solar sales and design. It provides
  remote shading analysis, LIDAR and satellite-based roof modeling, PV system design,
  performance simulation, financing, and proposal generation so installers can design
  and sell solar projects without a site visit. The Aurora API (v2024.05) is a
  tenant-scoped REST API secured with API-key bearer tokens that lets integrations
  manage projects, request and retrieve designs, generate proposals, pull consumption
  profiles, manage users and webhooks, and push financings and agreements.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Solar
- Solar Design
- PV
- Proposals
- CleanTech
- Energy
- Sales Software
created: '2026-07-04'
modified: '2026-07-04'

  modeledNote: |
    Confirmed paths were read directly from Aurora's public reference (List
    Projects, Create Design Request, Create Webhook), which established the
    api.aurorasolar.com host and the /tenants/{tenant_id}/<resource>
    convention. The modeled paths follow that same convention and Aurora's
    published operation catalog (docs.aurorasolar.com/llms.txt lists operations
    such as List/Create/Retrieve/Update Project, Create/Accept Design Request,
    Create/Retrieve Design, Create/Retrieve Proposal, Retrieve/Update
    Consumption Profile, Retrieve Tenant, List/Create/Update User, CRUD
    Webhooks, List/Retrieve/Push Financing, and Retrieve Agreement + Agreement
    Link). Exact path segments for modeled operations should be reconciled
    against the live reference, which is partially gated behind login.
sources:
  - url: https://docs.aurorasolar.com/reference/aurora-solar-api
    type: Documentation
    note: API overview; tenant-scoped REST, current version v2024.05.
  - url: https://docs.aurorasolar.com/reference/authentication
    type: Documentation
    note: API-key bearer tokens (sk_/rk_, sand_/prod_); production host api.aurorasolar.com, sandbox api-sandbox.aurorasolar.com; token UI on v2.aurorasolar.com.
  - url: https://docs.aurorasolar.com/reference/listprojects
    type: APIReference
    note: Confirmed GET /tenants/{tenant_id}/projects with page/per_page (default 100, max 250).
  - url: https://docs.aurorasolar.com/reference/createdesignrequest
    type: APIReference
    note: Confirmed POST /tenants/{tenant_id}/design_requests; async; falls back to project lat/long.
  - url: https://docs.aurorasolar.com/reference/createwebhook
    type: APIReference
    note: Confirmed POST /tenants/{tenant_id}/webhooks; webhooks are the real-time delivery mechanism (not WebSocket).
  - url: https://docs.aurorasolar.com/reference/rate-limits
    type: Documentation
    note: Default 90 requests/minute; 429 with Retry-After; recommends webhooks over polling. No WebSocket mentioned.
  - url: https://docs.aurorasolar.com/llms.txt
    type: Documentation
    note: Machine-readable index of all reference pages and operations. All HTTP REST; no WebSocket surface listed.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists on Aurora Solar's API. The public API
    is request/response REST over HTTPS, with real-time delivery handled by
    outbound webhooks and long-running work handled by asynchronous
    submit-then-poll endpoints. No AsyncAPI document was created because there
    is no server-push streaming transport (WebSocket or SSE) on Aurora's own
    API to model.

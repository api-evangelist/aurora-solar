aid: aurora-solar
name: Aurora Solar
review:
  question: Does Aurora Solar expose a documented public WebSocket API?
  answer: false
  date: '2026-07-04'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Aurora Solar's public developer surface
    is a request/response REST API over HTTPS. Its "real-time" event delivery
    is implemented with outbound webhooks (Aurora POSTs event notifications to a
    customer-configured HTTPS endpoint), not a server-push streaming transport
    on Aurora's own API. There is no documented WebSocket (ws/wss) or
    Server-Sent Events (SSE) channel on Aurora's API to model. Long-running
    work (AutoDesigner, irradiance analysis, performance simulation, plan sets,
    utility-bill OCR) uses asynchronous submit-then-poll endpoints plus webhook
    completion callbacks - still plain HTTP.
findings:
  summary: |
    Aurora Solar does not publish a documented public WebSocket API. The Aurora
    API (current version v2024.05) is a tenant-scoped REST API. The API host is
    https://api.aurorasolar.com (production) and https://api-sandbox.aurorasolar.com
    (sandbox); every resource lives under /tenants/{tenant_id}. Requests are
    authenticated with an API-key bearer token issued from the tenant's API
    Tokens screen (Standard keys prefixed sk_, Restricted keys prefixed rk_,
    with sand_/prod_ denoting the environment) and passed as
    Authorization: Bearer <token>. The app/token-management UI lives on
    v2.aurorasolar.com and v2-sandbox.aurorasolar.com, which is distinct from
    the api. host. Real-time updates are delivered via outbound webhooks, and
    several design operations are asynchronous (submit a request, then poll or
    receive a webhook). No realtime, bidirectional, or streaming WebSocket
    (ws:// or wss://) endpoint is documented anywhere in Aurora's API reference.
  openSource: |
    The Aurora API and platform are proprietary/commercial SaaS. There is a
    public GitHub organization (github.com/aurorasolar), but the core product is
    not open source. Pricing is not published; plans are quoted through sales
    (per-user seat licenses across tiers plus a credit-based consumption option).
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.aurorasolar.com
      documented: true
      note: Tenant-scoped REST API under /tenants/{tenant_id}. Sandbox host is https://api-sandbox.aurorasolar.com.
    - protocol: Webhook
      scheme: https
      documented: true
      note: Aurora POSTs event notifications (project/design/async-job lifecycle) to a customer-configured HTTPS endpoint. Server-to-endpoint HTTP, not WebSocket.
    - protocol: Async Poll
      scheme: https
      documented: true
      note: AutoDesigner, irradiance analysis, performance simulation, plan sets, and utility-bill uploads are submit-then-poll (retrieve *status) operations over HTTPS. Not server push.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in Aurora's API reference as of the review date.
